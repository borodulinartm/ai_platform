name: Deploy AI Crawl

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    - name: Copy ai-crawl to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ vars.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "ai-crawl/*"
        target: "/usr1/ai-platform"
        strip_components: 1

    - name: Build and run container
      uses: appleboy/ssh-action@master
      with:
        host: ${{ vars.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          mkdir -p /usr1/ai-platform/ai-crawl
          cp -r /usr1/ai-platform/ai-crawl/ai-crawl/* /usr1/ai-platform/ai-crawl/ 2>/dev/null || true
          rm -rf /usr1/ai-platform/ai-crawl/ai-crawl 2>/dev/null || true
          ls -la /usr1/ai-platform/ai-crawl/
          export LLM_KEY=${{ secrets.LLM_KEY }}
          export LLM_URL=${{ vars.LLM_URL }}
          export LLM_MODEL=${{ vars.LLM_MODEL }}
          export LLM_PROVIDER=${{ vars.LLM_PROVIDER }}
          export DB_USER=${{ vars.DB_USER }}
          export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          export DB_NAME=${{ vars.DB_NAME }}
          export DB_HOST=${{ vars.DB_HOST }}
          export DB_PORT=${{ vars.DB_PORT }}
          docker build --no-cache -t ai-crawl /usr1/ai-platform/ai-crawl
          docker stop ai-crawl 2>/dev/null || true
          docker rm ai-crawl 2>/dev/null || true
          docker run -d \
            --name ai-crawl \
            --restart unless-stopped \
            -e CRON_MINUTE=${CRON_MINUTE:-5} \
            -e LLM_URL="$LLM_URL" \
            -e LLM_KEY="$LLM_KEY" \
            -e LLM_MODEL="$LLM_MODEL" \
            -e LLM_PROVIDER="$LLM_PROVIDER" \
            -e DB_USER="$DB_USER" \
            -e DB_PASSWORD="$DB_PASSWORD" \
            -e DB_NAME="$DB_NAME" \
            -e DB_HOST="$DB_HOST" \
            -e DB_PORT="$DB_PORT" \
            -e HTTP_PORT="${HTTP_PORT:-8090}" \
            -p 8090:8090 \
            ai-crawl
