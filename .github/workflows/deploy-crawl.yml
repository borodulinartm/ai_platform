name: Deploy AI Crawl

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    - name: Copy ai-crawl to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ vars.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "ai-crawl/*"
        target: "/usr1/ai-platform/ai-crawl"
        strip_components: 0

    - name: Build and run container
      uses: appleboy/ssh-action@master
      with:
        host: ${{ vars.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          mkdir -p /usr1/ai-platform/ai-crawl
          cd /usr1/ai-platform/ai-crawl
          export LLM_KEY=${{ secrets.LLM_KEY }}
          export LLM_URL=${{ vars.LLM_URL }}
          export LLM_MODEL=${{ vars.LLM_MODEL }}
          export LLM_PROVIDER=${{ vars.LLM_PROVIDER }}
          export DB_USER=${{ vars.DB_USER }}
          export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          export DB_NAME=${{ vars.DB_NAME }}
          export DB_HOST=${{ vars.DB_HOST }}
          export DB_PORT=${{ vars.DB_PORT }}
          docker compose up -d --build 2>/dev/null || docker-compose up -d --build
