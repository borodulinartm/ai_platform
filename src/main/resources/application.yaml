spring:
  http:
    client:
      connect-timeout: 20s
      read-timeout: 5m
  profiles:
    active: local
  aop:
    auto: true
    proxy-target-class: true
  application:
    name: freshrss_news_upload
  datasource:
    url: jdbc:postgresql://183.87.45.129:5432/freshrss
    username: freshrss
    password: freshrss
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      chat:
        options:
          temperature: 0.7
          model: deepseek/deepseek-v3.2
      base-url: ${LLM_URL}
      api-key: ${LLM_KEY}

logging:
  level:
    org.springframework.ai.retry.autoconfigure.*: ERROR
server:
  servlet:
    context-path: /api
  port: 8888

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml

cloud:
  directories:
    category: category
    feed: feed
    articles: articles
    news_summary: news_summary

  file-name: report.json
  base-path-files: ${BASE_PATH_CLOUD}
